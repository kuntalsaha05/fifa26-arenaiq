<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArenaIQ - Automated Test Suite</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-primary: #050811;
      --bg-secondary: #0c1224;
      --text-color: #f1f5f9;
      --text-secondary: #94a3b8;
      --glass-bg: rgba(13, 19, 36, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --green-color: #10b981;
      --red-color: #ef4444;
      --blue-color: #3b82f6;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-color);
      padding: 40px;
      margin: 0;
    }
    h1, h2 {
      font-family: 'Outfit', sans-serif;
      margin-top: 0;
    }
    .test-header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 20px;
    }
    .test-summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .summary-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .summary-val {
      font-size: 2.2rem;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
      margin-top: 8px;
    }
    .summary-val.passed { color: var(--green-color); }
    .summary-val.failed { color: var(--red-color); }
    .summary-val.total { color: var(--blue-color); }
    
    .test-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .test-table th {
      background: rgba(255,255,255,0.03);
      padding: 14px 20px;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--glass-border);
    }
    .test-table td {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.88rem;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge.pass {
      background: rgba(16, 185, 129, 0.12);
      color: var(--green-color);
    }
    .badge.fail {
      background: rgba(239, 68, 68, 0.12);
      color: var(--red-color);
    }
    .details-box {
      font-family: monospace;
      background: rgba(0,0,0,0.2);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      max-width: 350px;
      word-break: break-all;
    }
    
    /* Hidden DOM stubs for app.js loading */
    #dom-stubs {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Hidden DOM elements required by app.js initialization logic -->
  <div id="dom-stubs" aria-hidden="true">
    <span id="live-time-label"></span>
    <span id="countdown-timer"></span>
    <select id="lang-select"><option value="en">English</option></select>
    <div id="chat-messages-box"></div>
    <input id="chat-input-field">
    <div id="eco-points-label"></div>
    
    <!-- Eco Rewards elements -->
    <div id="reward-1"></div>
    <div id="reward-2"></div>
    <div id="reward-1-diff"></div>
    <div id="reward-2-diff"></div>
    <div id="lbl-reward-req-1"></div>
    <div id="lbl-reward-req-2"></div>
    <div id="lbl-reward-req-1-diff"></div>
    <div id="lbl-reward-req-2-diff"></div>
    <div id="user-eco-level"></div>

    <!-- Booking confirmation -->
    <div id="booking-confirmation"></div>
    <select id="sensory-time"><option value="1">19:00 - 19:30</option></select>
    <input id="sensory-guests" value="2">
    
    <!-- Help / Incidents elements -->
    <input id="help-seat" value="Sec 114, Row D, Seat 8">
    <textarea id="help-description">Need elevator gate assistance</textarea>
    <div id="ops-incident-feed"></div>
    <div id="incident-count-badge"></div>
    <div id="ops-incidents-val"></div>
    <span id="volunteer-request-status"></span>
    <span id="vol-status-text"></span>
    <span id="vol-status-desc"></span>
    
    <!-- Dispatcher elements -->
    <textarea id="dispatcher-raw-text"></textarea>
    <div id="dispatcher-sent-banner"></div>
    <div id="disp-title"></div>
    <div id="disp-severity"></div>
    <div id="disp-location"></div>
    <div id="disp-group"></div>
    <div id="disp-summary"></div>
    <ul id="disp-checklist"></ul>

    <!-- AI alert banner -->
    <div id="ai-alert-banner"></div>
    <div id="alert-title"></div>
    <div id="alert-desc"></div>

    <!-- Simulation widgets -->
    <div id="current-sim-scenario"></div>
    <div id="current-sim-desc"></div>
    <div id="ops-attendance-val"></div>
    <div id="ops-avg-queue-val"></div>
    
    <!-- Map stubs -->
    <div id="zone-A"></div>
    <div id="zone-B"></div>
    <div id="gate-a"></div>
    <div id="gate-b"></div>
    <div id="map-target-title"></div>
    <div id="map-target-details"></div>

    <!-- Carbon offsets -->
    <div id="mode-train"></div>
    <div id="mode-shuttle"></div>
    <div id="mode-car"></div>
    <button id="btn-log-ride-text"></button>

    <!-- Score tickers -->
    <span id="score-arg"></span>
    <span id="score-esp"></span>

    <!-- Charts canvases -->
    <canvas id="occupancyChart"></canvas>
    <canvas id="queueTimesChart"></canvas>
    <canvas id="yamalRadarChart"></canvas>
  </div>

  <div class="test-header-container">
    <div>
      <h1>ArenaIQ Automated Verification Suite</h1>
      <p style="color: var(--text-secondary); margin: 4px 0 0 0;">Unit tests and technical compliance dashboard</p>
    </div>
    <button onclick="runTestSuite()" style="background: var(--blue-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: inherit;">
      Rerun Tests
    </button>
  </div>

  <div class="test-summary-grid">
    <div class="summary-card">
      <div style="color: var(--text-secondary); font-size: 0.9rem;">Total Asserts</div>
      <div class="summary-val total" id="total-tests">0</div>
    </div>
    <div class="summary-card">
      <div style="color: var(--text-secondary); font-size: 0.9rem;">Passed Asserts</div>
      <div class="summary-val passed" id="passed-tests">0</div>
    </div>
    <div class="summary-card">
      <div style="color: var(--text-secondary); font-size: 0.9rem;">Failed Asserts</div>
      <div class="summary-val failed" id="failed-tests">0</div>
    </div>
  </div>

  <h2>Test Cases Execution</h2>
  <table class="test-table">
    <thead>
      <tr>
        <th scope="col">Assert ID</th>
        <th scope="col">Module / Target</th>
        <th scope="col">Description</th>
        <th scope="col">Expected</th>
        <th scope="col">Actual</th>
        <th scope="col">Status</th>
      </tr>
    </thead>
    <tbody id="test-results-body">
      <!-- Generated dynamically -->
    </tbody>
  </table>

  <!-- Load App Core script -->
  <script src="app.js"></script>

  <script>
    // Test Harness Framework
    let assertCount = 0;
    let passCount = 0;
    let failCount = 0;

    function assertEquals(id, module, description, expected, actual) {
      assertCount++;
      const passed = (expected === actual);
      if (passed) passCount++; else failCount++;

      const tbody = document.getElementById("test-results-body");
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><strong>${id}</strong></td>
        <td>${module}</td>
        <td>${description}</td>
        <td><div class="details-box">${escapeHTML(String(expected))}</div></td>
        <td><div class="details-box">${escapeHTML(String(actual))}</div></td>
        <td>
          <span class="badge ${passed ? 'pass' : 'fail'}">${passed ? 'PASS' : 'FAIL'}</span>
        </td>
      `;
      tbody.appendChild(tr);
    }

    function runTestSuite() {
      // Clear previous results
      document.getElementById("test-results-body").innerHTML = "";
      assertCount = 0;
      passCount = 0;
      failCount = 0;

      // Stub window alerts to prevent automated scan blocker hangs!
      const originalAlert = window.alert;
      window.alert = () => {};

      // ==================== 1. XSS SANITIZER TESTS ====================
      try {
        assertEquals("SEC-01", "Sanitizer", "escapeHTML escapes less-than brackets", "&lt;script&gt;", escapeHTML("<script>"));
        assertEquals("SEC-02", "Sanitizer", "escapeHTML escapes ampersands", "soda &amp; juice", escapeHTML("soda & juice"));
        assertEquals("SEC-03", "Sanitizer", "escapeHTML escapes double quotes", "&quot;USA&quot;", escapeHTML('"USA"'));
        assertEquals("SEC-04", "Sanitizer", "escapeHTML escapes single quotes", "Lamine&#039;s Stats", escapeHTML("Lamine's Stats"));
        assertEquals("SEC-05", "Sanitizer", "escapeHTML handles non-string gracefully", "", escapeHTML(12345));
      } catch (err) {
        assertEquals("SEC-ERR", "Sanitizer", "Exception: " + err.message, true, false);
      }

      // ==================== 2. MULTILINGUAL AI BOT ROUTINGS ====================
      try {
        appState.language = 'en';
        assertEquals("AI-01", "AI Bot EN", "Matches transit queries", chatMockResponses['en'].train, getMockAIResponse("train transit directions"));
        assertEquals("AI-02", "AI Bot EN", "Matches vegan queries", chatMockResponses['en'].vegan, getMockAIResponse("any vegan concessions?"));
        assertEquals("AI-03", "AI Bot EN", "Matches sensory queries", chatMockResponses['en'].sensory, getMockAIResponse("sensory room location"));
        assertEquals("AI-04", "AI Bot EN", "Matches prohibited queries", chatMockResponses['en'].prohibited, getMockAIResponse("Are big bags banned?"));
        assertEquals("AI-05", "AI Bot EN", "Fallback matches default", chatMockResponses['en'].default, getMockAIResponse("unsupported statement here"));

        appState.language = 'es';
        assertEquals("AI-ES-01", "AI Bot ES", "Matches spanish vegan concessions", chatMockResponses['es'].vegan, getMockAIResponse("Comida vegano"));
        assertEquals("AI-ES-02", "AI Bot ES", "Matches spanish default fallback", chatMockResponses['es'].default, getMockAIResponse("hola"));

        appState.language = 'fr';
        assertEquals("AI-FR-01", "AI Bot FR", "Matches French quiet room", chatMockResponses['fr'].sensory, getMockAIResponse("salle quiet"));

        appState.language = 'ar';
        assertEquals("AI-AR-01", "AI Bot AR", "Matches Arabic transit", chatMockResponses['ar'].train, getMockAIResponse("قطار"));
      } catch (err) {
        assertEquals("AI-ERR", "AI Bot", "Exception: " + err.message, true, false);
      }

      // ==================== 3. CARBON GREEN TRANSIT MATHS ====================
      try {
        appState.ecoPoints = 0;
        appState.selectedTransit = 'train';
        logSustainableChoice();
        assertEquals("ECO-01", "Transit Reward", "Train travel awards +40 Eco points", 40, appState.ecoPoints);

        appState.selectedTransit = 'shuttle';
        logSustainableChoice();
        assertEquals("ECO-02", "Transit Reward", "Shuttle awards +20 Eco points (Total: 60)", 60, appState.ecoPoints);

        // Verification of levels achievements unlocking
        const levelLabel = document.getElementById("user-eco-level").innerText;
        assertEquals("ECO-03", "Eco Achievements", "Unlocks reward milestone levels at 50+ points", "REWARD UNLOCKED!", document.getElementById("lbl-reward-req-1").innerText);
      } catch (err) {
        assertEquals("ECO-ERR", "Transit Reward", "Exception: " + err.message, true, false);
      }

      // ==================== 4. APP ROLE & CHANNELS STATE CONTROLS ====================
      try {
        // Toggle Operations HQ role
        switchRole('ops');
        assertEquals("ROLE-01", "Role Management", "Role switched to operations HQ", 'ops', appState.role);
        assertEquals("ROLE-02", "Role Management", "Operations menu visible", false, document.getElementById("nav-ops").classList.contains("hidden"));

        // Toggle back to Fan Role
        switchRole('fan');
        assertEquals("ROLE-03", "Role Management", "Role switched back to fan companion", 'fan', appState.role);
        assertEquals("ROLE-04", "Role Management", "Operations menu hidden", true, document.getElementById("nav-ops").classList.contains("hidden"));

        // Switch channel tab within Fan Companion
        switchTab('fan-transit');
        assertEquals("TAB-01", "Tab Navigation", "Active tab updated to fan-transit", 'fan-transit', appState.currentTab);
      } catch (err) {
        assertEquals("ROLE-ERR", "Role System", "Exception: " + err.message, true, false);
      }

      // ==================== 5. INTERACTIVE MAP DATA GATES ====================
      try {
        // Mock selecting high wait Zone B on map
        selectMapZone('Zone B');
        assertEquals("MAP-01", "Map Interface", "Zone B wait details mapped", "Zone B Details", document.getElementById("map-target-title").innerText);
        assertEquals("MAP-02", "Map Interface", "Zone B high occupancy mapped", "92%", document.getElementById("map-target-details").querySelector("strong:nth-child(2)").innerText);

        // Mock selecting Gate B access point
        selectMapGate('Gate B');
        assertEquals("MAP-03", "Map Interface", "Gate B wait time mapped", "18 mins wait", document.getElementById("map-target-details").querySelector("strong").innerText);
      } catch (err) {
        assertEquals("MAP-ERR", "Map Interface", "Exception: " + err.message, true, false);
      }

      // ==================== 6. SEAT BOOKINGS VALIDATIONS ====================
      try {
        appState.bookingCounter = 1000;
        bookSensoryRoom();
        assertEquals("BOOK-01", "Reservations", "Sensory slot code reservation generated", "#SR-1000", document.getElementById("booking-confirmation").querySelector("strong:nth-child(2)").innerText);
        assertEquals("BOOK-02", "Reservations", "Reservations slot counters auto-incremented", 1001, appState.bookingCounter);
      } catch (err) {
        assertEquals("BOOK-ERR", "Reservations", "Exception: " + err.message, true, false);
      }

      // ==================== 7. EMERGENCY VOLUNTEERS TIMELINE LOGS ====================
      try {
        appState.incidentCount = 0;
        addIncidentToOpsHQ("Sec 114, Row F", "Requires wheelchair escort");
        assertEquals("INC-01", "Staff Incidents", "Incident count increased to 1", 1, appState.incidentCount);
        
        const incidentList = document.getElementById("ops-incident-feed");
        assertEquals("INC-02", "Staff Incidents", "Incident card inserted dynamically", 1, incidentList.children.length);

        // Resolve Incident
        const cardId = incidentList.children[0].id;
        resolveIncident(cardId);
        assertEquals("INC-03", "Staff Incidents", "Incident card removed upon resolution", 0, incidentList.children.length);
        assertEquals("INC-04", "Staff Incidents", "Incident count decremented to 0", 0, appState.incidentCount);
      } catch (err) {
        assertEquals("INC-ERR", "Staff Incidents", "Exception: " + err.message, true, false);
      }

      // ==================== 8. DICTIONARIES INTEGRITY AND COVERAGE ====================
      try {
        const langKeysEN = Object.keys(translations.en).sort();
        const langKeysES = Object.keys(translations.es).sort();
        const langKeysFR = Object.keys(translations.fr).sort();
        const langKeysPT = Object.keys(translations.pt).sort();
        const langKeysAR = Object.keys(translations.ar).sort();

        assertEquals("LANG-01", "Localization Integrity", "Spanish key parity verified", langKeysEN.length, langKeysES.length);
        assertEquals("LANG-02", "Localization Integrity", "French key parity verified", langKeysEN.length, langKeysFR.length);
        assertEquals("LANG-03", "Localization Integrity", "Portuguese key parity verified", langKeysEN.length, langKeysPT.length);
        assertEquals("LANG-04", "Localization Integrity", "Arabic key parity verified", langKeysEN.length, langKeysAR.length);
      } catch (err) {
        assertEquals("LANG-ERR", "Localization", "Exception: " + err.message, true, false);
      }

      // Restore window alert logic
      window.alert = originalAlert;

      // Update counters in DOM
      document.getElementById("total-tests").innerText = assertCount;
      document.getElementById("passed-tests").innerText = passCount;
      document.getElementById("failed-tests").innerText = failCount;
    }

    // Run automatically on boot
    window.onload = () => {
      runTestSuite();
    }
  </script>
</body>
</html>
