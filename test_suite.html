<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArenaIQ - Automated Test Suite</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-primary: #050811;
      --bg-secondary: #0c1224;
      --text-color: #f1f5f9;
      --text-secondary: #94a3b8;
      --glass-bg: rgba(13, 19, 36, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --green-color: #10b981;
      --red-color: #ef4444;
      --blue-color: #3b82f6;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-color);
      padding: 40px;
      margin: 0;
    }
    h1, h2 {
      font-family: 'Outfit', sans-serif;
      margin-top: 0;
    }
    .test-header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 20px;
    }
    .test-summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .summary-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .summary-val {
      font-size: 2.2rem;
      font-weight: 800;
      font-family: 'Outfit', sans-serif;
      margin-top: 8px;
    }
    .summary-val.passed { color: var(--green-color); }
    .summary-val.failed { color: var(--red-color); }
    .summary-val.total { color: var(--blue-color); }
    
    .test-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .test-table th {
      background: rgba(255,255,255,0.03);
      padding: 14px 20px;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--glass-border);
    }
    .test-table td {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.88rem;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge.pass {
      background: rgba(16, 185, 129, 0.12);
      color: var(--green-color);
    }
    .badge.fail {
      background: rgba(239, 68, 68, 0.12);
      color: var(--red-color);
    }
    .details-box {
      font-family: monospace;
      background: rgba(0,0,0,0.2);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      max-width: 350px;
      word-break: break-all;
    }
    
    /* Hidden DOM stubs for app.js loading */
    #dom-stubs {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Hidden DOM elements required by app.js initialization logic -->
  <div id="dom-stubs" aria-hidden="true">
    <span id="live-time-label"></span>
    <span id="countdown-timer"></span>
    <select id="lang-select"><option value="en">English</option></select>
    <div id="chat-messages-box"></div>
    <input id="chat-input-field">
    <div id="eco-points-label"></div>
    <div id="reward-1"></div>
    <div id="reward-2"></div>
    <div id="reward-1-diff"></div>
    <div id="reward-2-diff"></div>
    <div id="lbl-reward-req-1"></div>
    <div id="lbl-reward-req-2"></div>
    <div id="lbl-reward-req-1-diff"></div>
    <div id="lbl-reward-req-2-diff"></div>
    <div id="user-eco-level"></div>
    <div id="booking-confirmation"></div>
    <div id="volunteer-request-status"></div>
    <div id="vol-status-text"></div>
    <div id="vol-status-desc"></div>
    <div id="ops-incident-feed"></div>
    <div id="incident-count-badge"></div>
    <div id="ops-incidents-val"></div>
    <div id="ai-alert-banner"></div>
    <div id="alert-title"></div>
    <div id="alert-desc"></div>
    <div id="current-sim-scenario"></div>
    <div id="current-sim-desc"></div>
    <div id="ops-attendance-val"></div>
    <div id="ops-avg-queue-val"></div>
    <canvas id="occupancyChart"></canvas>
    <canvas id="queueTimesChart"></canvas>
  </div>

  <div class="test-header-container">
    <div>
      <h1>ArenaIQ Automated Verification Suite</h1>
      <p style="color: var(--text-secondary); margin: 4px 0 0 0;">Unit tests and technical compliance dashboard</p>
    </div>
    <button onclick="runTestSuite()" style="background: var(--blue-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: inherit;">
      Rerun Tests
    </button>
  </div>

  <div class="test-summary-grid">
    <div class="summary-card">
      <div style="color: var(--text-secondary); font-size: 0.9rem;">Total Asserts</div>
      <div class="summary-val total" id="total-tests">0</div>
    </div>
    <div class="summary-card">
      <div style="color: var(--text-secondary); font-size: 0.9rem;">Passed Asserts</div>
      <div class="summary-val passed" id="passed-tests">0</div>
    </div>
    <div class="summary-card">
      <div style="color: var(--text-secondary); font-size: 0.9rem;">Failed Asserts</div>
      <div class="summary-val failed" id="failed-tests">0</div>
    </div>
  </div>

  <h2>Test Cases Execution</h2>
  <table class="test-table">
    <thead>
      <tr>
        <th scope="col">Assert ID</th>
        <th scope="col">Module / Target</th>
        <th scope="col">Description</th>
        <th scope="col">Expected</th>
        <th scope="col">Actual</th>
        <th scope="col">Status</th>
      </tr>
    </thead>
    <tbody id="test-results-body">
      <!-- Generated dynamically -->
    </tbody>
  </table>

  <!-- Load App Core script -->
  <script src="app.js"></script>

  <script>
    // Test Harness Framework
    let assertCount = 0;
    let passCount = 0;
    let failCount = 0;

    function assertEquals(id, module, description, expected, actual) {
      assertCount++;
      const passed = (expected === actual);
      if (passed) passCount++; else failCount++;

      const tbody = document.getElementById("test-results-body");
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><strong>${id}</strong></td>
        <td>${module}</td>
        <td>${description}</td>
        <td><div class="details-box">${escapeHTML(String(expected))}</div></td>
        <td><div class="details-box">${escapeHTML(String(actual))}</div></td>
        <td>
          <span class="badge ${passed ? 'pass' : 'fail'}">${passed ? 'PASS' : 'FAIL'}</span>
        </td>
      `;
      tbody.appendChild(tr);
    }

    function runTestSuite() {
      // Clear previous results
      document.getElementById("test-results-body").innerHTML = "";
      assertCount = 0;
      passCount = 0;
      failCount = 0;

      // 1. Validate XSS Sanitizer Function
      try {
        assertEquals(
          "SEC-01",
          "Security Sanitizer",
          "escapeHTML converts '<' brackets to safe HTML entity",
          "&lt;script&gt;",
          escapeHTML("<script>")
        );
        assertEquals(
          "SEC-02",
          "Security Sanitizer",
          "escapeHTML converts '&' character to safe HTML entity",
          "soda &amp; juice",
          escapeHTML("soda & juice")
        );
        assertEquals(
          "SEC-03",
          "Security Sanitizer",
          "escapeHTML converts double quotes to safe entity",
          "&quot;USA&quot;",
          escapeHTML('"USA"')
        );
      } catch (err) {
        assertEquals("SEC-ERR", "Security Sanitizer", "Exception occurred: " + err.message, true, false);
      }

      // 2. Validate GenAI Keyword Chat Routing Rules
      try {
        // Switch language to english
        appState.language = 'en';
        
        assertEquals(
          "AI-01",
          "GenAI Chat Matching",
          "Keywords matching 'train' retrieves rail schedules",
          chatMockResponses['en'].train,
          getMockAIResponse("How to go there by train?")
        );
        assertEquals(
          "AI-02",
          "GenAI Chat Matching",
          "Keywords matching 'vegan' retrieves food stand list",
          chatMockResponses['en'].vegan,
          getMockAIResponse("Vegan food concession locations?")
        );
        assertEquals(
          "AI-03",
          "GenAI Chat Matching",
          "Unmatched queries retrieve fallback default help response",
          chatMockResponses['en'].default,
          getMockAIResponse("Tell me a random story about final matches")
        );
      } catch (err) {
        assertEquals("AI-ERR", "GenAI Chat Matching", "Exception occurred: " + err.message, true, false);
      }

      // 3. Validate Sustainability / Eco points logic
      try {
        // Reset state points
        appState.ecoPoints = 0;
        
        // Log train (mode active)
        appState.selectedTransit = 'train';
        logSustainableChoice();
        assertEquals(
          "ECO-01",
          "Sustainability Math",
          "Train travel awards +40 Eco points",
          40,
          appState.ecoPoints
        );

        appState.selectedTransit = 'shuttle';
        logSustainableChoice();
        assertEquals(
          "ECO-02",
          "Sustainability Math",
          "Additional shuttle travel adds +20 points (Total: 60)",
          60,
          appState.ecoPoints
        );
      } catch (err) {
        assertEquals("ECO-ERR", "Sustainability Math", "Exception: " + err.message, true, false);
      }

      // 4. Validate Multilingual Translations Dictionaries Coverage
      try {
        const langKeysEN = Object.keys(translations.en).sort();
        const langKeysES = Object.keys(translations.es).sort();
        const langKeysFR = Object.keys(translations.fr).sort();
        const langKeysPT = Object.keys(translations.pt).sort();
        const langKeysAR = Object.keys(translations.ar).sort();

        assertEquals(
          "LANG-01",
          "Localization Dictionaries",
          "Spanish dictionary contains same keys count as English",
          langKeysEN.length,
          langKeysES.length
        );
        assertEquals(
          "LANG-02",
          "Localization Dictionaries",
          "French dictionary contains same keys count as English",
          langKeysEN.length,
          langKeysFR.length
        );
        assertEquals(
          "LANG-03",
          "Localization Dictionaries",
          "Arabic dictionary contains same keys count as English",
          langKeysEN.length,
          langKeysAR.length
        );
      } catch (err) {
        assertEquals("LANG-ERR", "Localization Dictionaries", "Exception: " + err.message, true, false);
      }

      // Update counters in DOM
      document.getElementById("total-tests").innerText = assertCount;
      document.getElementById("passed-tests").innerText = passCount;
      document.getElementById("failed-tests").innerText = failCount;
    }

    // Run automatically on boot
    window.onload = () => {
      runTestSuite();
    }
  </script>
</body>
</html>
